name: ATLAS

on:
  pull_request:
  push:

jobs:
  atlas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Checkout ATLAS
        uses: actions/checkout@v4
        with:
          repository: atlas/atlas-pipeline
          ref: master
          path: atlas-pipeline

      - name: Run ATLAS
        run: |
          set -eu

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            ATLAS_TRIGGER="pr"
          else
            ATLAS_TRIGGER="push"
          fi

          ATLAS_LIB="$PWD/atlas-pipeline/src/lib"
          TARGET_REPO_ROOT="$PWD"

          if [ -n "${PYTHONPATH:-}" ]; then
            export PYTHONPATH="$ATLAS_LIB:$PYTHONPATH"
          else
            export PYTHONPATH="$ATLAS_LIB"
          fi

          python3 -m atlas.main --repo-root "$TARGET_REPO_ROOT" validate
          python3 -m atlas.main --repo-root "$TARGET_REPO_ROOT" run --trigger "$ATLAS_TRIGGER"

      - name: Upload ATLAS output
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: atlas-output-${{ github.run_id }}
          path: bld/atlas/**
          if-no-files-found: warn
